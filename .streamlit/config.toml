[theme]
primaryColor = "#B7893F"
backgroundColor = "#FBFAF8"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#171411"
font = "sans serif"

[server]
maxUploadSize = 300
headless = true
enableXsrfProtection = true

[browser]
gatherUsageStats = false

# Reduce background work in the long-running Community Cloud process.
[runner]
fastReruns = false


[client]
toolbarMode = "minimal"
