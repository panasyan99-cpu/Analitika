name: Build Windows installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build application
        shell: pwsh
        run: pyinstaller --noconfirm --clean Analitika.spec

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer_inno_setup.iss'

      - name: Verify installer
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path installer_output -Filter "Analitika_Setup_*.exe"
          if (-not $files) {
            Write-Error "Installer was not created. Contents of installer_output:"
            Get-ChildItem -Path installer_output -Recurse -ErrorAction SilentlyContinue
            exit 1
          }
          $files | ForEach-Object { Write-Host "Found installer: $($_.FullName)" }

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Analitika_Setup_1.1.5_DEMO
          path: installer_output/Analitika_Setup_*.exe
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/Analitika_Setup_*.exe
          body_path: CHANGELOG.md
