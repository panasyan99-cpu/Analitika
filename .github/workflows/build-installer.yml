name: Build Windows installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build application
        run: pyinstaller --noconfirm --clean Analitika.spec
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer_inno_setup.iss'
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Analitika_Setup_1.1.1
          path: installer_output/Analitika_Setup_1.1.1.exe
      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/Analitika_Setup_1.1.1.exe
          body_path: CHANGELOG.md
