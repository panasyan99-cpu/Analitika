name: Build Windows installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Read application version
        id: version
        shell: pwsh
        run: |
          $config = Get-Content version.json -Raw | ConvertFrom-Json
          $version = $config.version
          if (-not $version) { throw "version.json does not contain version" }
          $numeric = ($version -replace '-rc\d+$','')
          "version=$version" >> $env:GITHUB_OUTPUT
          "version_quad=$numeric.0" >> $env:GITHUB_OUTPUT
          "is_rc=$($version -match '-rc\d+$')" >> $env:GITHUB_OUTPUT
          Write-Host "Building Analitika $version"

      - name: Validate tag matches version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $expected = "v${{ steps.version.outputs.version }}"
          if ("${{ github.ref_name }}" -ne $expected) {
            throw "Tag ${{ github.ref_name }} does not match version.json ($expected)"
          }

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run syntax checks
        shell: pwsh
        run: |
          python -m py_compile Analitika.py src/report.py src/updater.py

      - name: Build application
        shell: pwsh
        run: pyinstaller --noconfirm --clean Analitika.spec

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ steps.version.outputs.version }}" `
            "/DMyAppVersionQuad=${{ steps.version.outputs.version_quad }}" `
            installer_inno_setup.iss

      - name: Verify installer and create checksum
        id: installer
        shell: pwsh
        run: |
          $path = "installer_output/Analitika_Setup_${{ steps.version.outputs.version }}.exe"
          if (-not (Test-Path $path)) { throw "Installer was not created: $path" }
          $hash = (Get-FileHash $path -Algorithm SHA256).Hash.ToLower()
          "$hash  Analitika_Setup_${{ steps.version.outputs.version }}.exe" | Out-File "$path.sha256" -Encoding ascii
          "path=$path" >> $env:GITHUB_OUTPUT
          Write-Host "Found installer: $path"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: Analitika_Setup_${{ steps.version.outputs.version }}
          path: |
            installer_output/Analitika_Setup_${{ steps.version.outputs.version }}.exe
            installer_output/Analitika_Setup_${{ steps.version.outputs.version }}.exe.sha256
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer_output/Analitika_Setup_${{ steps.version.outputs.version }}.exe
            installer_output/Analitika_Setup_${{ steps.version.outputs.version }}.exe.sha256
          body_path: CHANGELOG.md
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.is_rc == 'True' }}
